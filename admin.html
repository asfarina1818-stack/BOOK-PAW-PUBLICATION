<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Blink Book Admin</title>

<link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="login-box">

<h1>Blink Book Admin</h1>

<p>Edit maklumat penulis</p>

<button id="loginBtn">
Login with Google
</button>

</div>

<div id="adminPanel" style="display:none">

<h2>Author Editor</h2>
<label>Pilih Penulis</label>

<select id="authorSelect">

<option value="SYAK">Syak Mazlan</option>

<option value="ILYAS">Ilyas Saaid</option>

<option value="SHASYA">Shasya Ali</option>

<option value="IMRAN">Imran Rosli</option>

<option value="NIJA">Nija</option>

<option value="FAIZAL">Faizal Hakimi</option>

</select>
<label>Nama</label>
<input id="nama">

<label>Peranan</label>
<input id="peranan">

<label>Biodata</label>
<textarea id="biodata"></textarea>

<label>Pendidikan</label>
<textarea id="pendidikan"></textarea>

<label>Kerjaya</label>
<textarea id="kerjaya"></textarea>

<label>Karya</label>
<textarea id="karya"></textarea>

<label>Pencapaian</label>
<textarea id="pencapaian"></textarea>

<button id="saveBtn">
SAVE
</button>

</div>

<script src="admin.js"></script>

</body>
</html>
